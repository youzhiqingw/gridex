name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep "^Xcode" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build -c release

  build-windows-exe:
    name: Build Windows exe
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
          }
          & 'C:\vcpkg\bootstrap-vcpkg.bat' -disableMetrics

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & 'C:\vcpkg\vcpkg.exe' install `
            sqlite3 libpq libmariadb openssl hiredis `
            nlohmann-json cpp-httplib libssh2 mongocxx bsoncxx `
            --triplet x64-windows

      - name: Build unpackaged exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\windows\scripts\build-unpackaged.ps1

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: gridex-windows-x64
          path: windows/Gridex/x64/Release/Gridex/
          if-no-files-found: error
