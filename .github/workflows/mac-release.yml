# macOS Release pipeline for Gridex
# ---------------------------------------------------------------------
# Triggers on push to main branch or manually via workflow_dispatch.
# Produces a notarized universal DMG (arm64 + x86_64) uploaded to
# Cloudflare R2 and a Sparkle appcast.xml updated at the same prefix.
#
# Required GitHub Secrets:
#   MACOS_CERT_P12_BASE64   Developer ID Application cert (.p12, base64-encoded)
#   MACOS_CERT_PASSWORD     Password for the .p12 archive
#   SIGN_IDENTITY           Cert common name or SHA-1 fingerprint
#   NOTARY_APPLE_ID         Apple ID used for notarization
#   NOTARY_PASSWORD         App-specific password for that Apple ID
#   NOTARY_TEAM_ID          Apple Developer Team ID
#   CLOUDFLARE_API_TOKEN    R2 write-capable Cloudflare API token
#   CLOUDFLARE_ACCOUNT_ID   Cloudflare account ID
#   SPARKLE_PRIVATE_KEY     Sparkle EdDSA private key for auto-update
# ---------------------------------------------------------------------

name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Only used for manual runs."
        required: false
        default: "0.0.0-manual"

permissions:
  contents: write   # needed to attach artifacts to GitHub Releases

jobs:
  release-macos:
    name: Release macOS
    runs-on: macos-14   # Apple Silicon — arm64 native, x86_64 cross-compiled
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # pinned: 692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: |
          XCODE=$(ls /Applications | grep "^Xcode_16" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          swift --version

      - name: Read version from Info.plist
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Use tag version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "0.0.0-manual" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" macos/Resources/Info.plist)
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION / Tag: $TAG"

      - name: Bump version in Info.plist (workflow_dispatch override)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            macos/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" \
            macos/Resources/Info.plist
          echo "Set version $VERSION (build $BUILD)"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="ci-$(uuidgen)"

          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign

          # Allow codesign to access the key without a password prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Add to search list so codesign can find the cert
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          rm "$RUNNER_TEMP/cert.p12"

      - name: Store notarytool credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials gridex-notarize \
            --apple-id  "$NOTARY_APPLE_ID" \
            --password  "$NOTARY_PASSWORD" \
            --team-id   "$NOTARY_TEAM_ID"

      - name: Build universal release (arm64 + x86_64)
        env:
          SIGN_IDENTITY:  ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: gridex-notarize
        run: ./scripts/release-all.sh

      - name: Import Sparkle EdDSA private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          security add-generic-password \
            -s "https://sparkle-project.org" \
            -a "ed25519" \
            -p "$SPARKLE_PRIVATE_KEY" \
            -U

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Publish DMG + appcast to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/publish.sh

      - name: Attach DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          DMG=$(ls dist/Gridex-*.dmg | head -1)
          gh release create "$TAG" "$DMG" \
            --title "Gridex $TAG" \
            --notes "Gridex $TAG — universal macOS build (Apple Silicon + Intel)" \
            --latest 2>/dev/null || \
          gh release upload "$TAG" "$DMG" --clobber

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4 # pinned: 65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: gridex-macos-universal
          path: dist/Gridex-*.dmg
          if-no-files-found: error

  release-windows:
    name: Release Windows
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # pinned: 692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match '^refs/tags/v') {
            # Use tag version
            $VERSION = "${{ github.ref_name }}"
            $VERSION = $VERSION -replace '^v',''
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "0.0.0-manual") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            # Read version from a file or use git tag
            $VERSION = (git describe --tags --always).TrimStart('v')
            if (-not $VERSION) {
              $VERSION = "0.0.0"
            }
          }
          $TAG = "v$VERSION"
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          "tag=$TAG" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VERSION / Tag: $TAG"

      - name: Install vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
          }
          & 'C:\vcpkg\bootstrap-vcpkg.bat' -disableMetrics

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & 'C:\vcpkg\vcpkg.exe' install `
            sqlite3 libpq libmariadb openssl hiredis `
            nlohmann-json cpp-httplib libssh2 mongo-cxx-driver `
            --triplet x64-windows

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Build the packaged version with installer
          .\windows\scripts\build-release.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4 # pinned: 65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: gridex-windows-x64
          path: windows/Gridex/x64/Release/Gridex-*.exe
          if-no-files-found: error

      - name: Attach Windows installer to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ steps.ver.outputs.tag }}"
          $INSTALLER = Get-ChildItem -Path "windows/Gridex/x64/Release" -Filter "Gridex-*.exe" | Select-Object -First 1
          if ($INSTALLER) {
            gh release upload "$TAG" "$($INSTALLER.FullName)" --clobber
          } else {
            Write-Error "Windows installer not found"
            exit 1
          }
